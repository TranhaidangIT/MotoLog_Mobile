name:  iOS Build — MotoLog Unsigned IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS IPA (Unsigned)
    runs-on: macos-latest

    permissions:
      contents: write

    steps:
      # 1. Tải source code từ GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Cài đặt Flutter Stable
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 3. Cài đặt packages
      - name: Flutter pub get
        run: flutter pub get

      # 4. Build iOS (không ký)
      - name: Build iOS release (no codesign)
        run: |
          flutter build ios --release --no-codesign

      # 5. Đóng gói thành file .ipa
      - name: Package .ipa
        run: | 
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/Release-iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r MotoLog.ipa Payload/
          echo "✅ IPA created: $(du -sh MotoLog.ipa | cut -f1)"

      # 6. Upload lên GitHub Releases
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: " MotoLog Build #${{ github.run_number }}"
          body: |
            ##  MotoLog — Bản Build iOS mới
            
            **Bản build số:** #${{ github.run_number }}
            **Commit:** ${{ github.sha }}

            ---

            ###  Hướng dẫn cài đặt lên iPhone (không cần tài khoản Apple Developer):
            1. Tải file **MotoLog.ipa** ở phần **Assets** bên dưới về máy tính Windows của bạn.
            2. Tải và cài phần mềm **[Sideloadly](https://sideloadly.io/)** (miễn phí).
            3. Cắm cáp kết nối iPhone với máy tính, mở khóa điện thoại, bấm **"Tin cậy"** khi được hỏi.
            4. Kéo thả file `MotoLog.ipa` vào ô IPA trên Sideloadly.
            5. Nhập **Apple ID** của bạn (account Apple thường cũng được, không cần Developer) và bấm **Start**.
            6. Trên iPhone: Vào `Cài đặt` → `Cài đặt chung` → `Quản lý VPN & Thiết bị` → Tìm email của bạn và bấm **Tin cậy**.
            7. Mở app **MotoLog** lên và tận hưởng! 🏍️

          files: build/ios/ipa/MotoLog.ipa
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
