name: motolog_mobile
description: "MotoLog — Nhật ký xe cá nhân"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.0.0

  # Local Database
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # UI & Animations
  lottie: ^3.1.0
  cached_network_image: ^3.4.1

  # Charts
  fl_chart: ^1.2.0

  # Image
  image_picker: ^1.2.2

  # Notifications
  flutter_local_notifications: ^17.2.2

  # Fonts & Icons
  google_fonts: ^8.1.0
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  google_sign_in: ^6.2.1
  cloud_firestore: ^5.2.1
  firebase_storage: ^12.1.3

  # Utils
  uuid: ^4.4.0
  intl: ^0.20.2
  shared_preferences: ^2.3.2

  # Other
  shimmer: ^3.0.0
  geolocator: ^14.0.3
  permission_handler: ^12.0.3
  http: ^1.6.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.8
  flutter_animate: ^4.5.2
  flutter_svg: ^2.3.0

flutter:
  uses-material-design: true
  assets:
    - img/logo/
    - img/backroud/
    - img/xe-2-banh/
    - img/xe-2-banh/tay-ga/
    - img/xe-4-banh/
    - img/phu-tung/
    - assets/images/
    - img/honda/tay_ga/LEAD/2026/cao_cap/
    - img/honda/tay_ga/LEAD/2026/dat_biet/
    - img/honda/tay_ga/LEAD/2026/tieu_chuan/
    - img/honda/xe_so/WAVE RSX/2026/dat_biet/
    - img/honda/xe_so/WAVE RSX/2026/the_thao/
    - img/honda/xe_so/WAVE RSX/2026/tieu_chuan/

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "img/logo/logo2.jpg"
  min_sdk_android: 21

flutter_native_splash:
  color: "#F8F6F0"
  image: "img/logo/logo.png"
  android_12:
    image: "img/logo/logo_padded.png"
    icon_background_color: "#F8F6F0"
