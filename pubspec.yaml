name: motolog_mobile
description: "MotoLog — Nhật ký xe cá nhân"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.0.0

  # Local Database
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # UI & Animations
  lottie: ^3.1.0
  cached_network_image: ^3.3.1

  # Charts
  fl_chart: ^0.68.0

  # Image
  image_picker: ^1.1.2

  # Notifications
  flutter_local_notifications: ^17.2.2

  # Fonts & Icons
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  google_sign_in: ^6.2.1
  cloud_firestore: ^5.2.1

  # Utils
  uuid: ^4.4.0
  intl: ^0.19.0
  shared_preferences: ^2.3.2

  # Other
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
